<template>
    <template if:true={hasFinancePermission}>
        <div class="banner-container">
            <img src={bannerUrl} alt="Finance Team Banner" class="banner-image" />
        </div>
    </template>
    <template if:false={hasFinancePermission}>
        <div class="slds-box slds-theme_default slds-p-around_medium slds-text-align_center slds-text-color_error">
            <strong>Access Denied:</strong> You lack the necessary permissions (Finance_LWC_Components) to view this banner.
        </div>
    </template>
</template>
